data_dir: "data"
template_specs_dir: "aligned_db/template_specs"

# Database related files
schema: "aligned_db/schema.sql"
raw_inserts: "aligned_db/tofu_data_inserts_raw.sql"
cleaned_inserts: "aligned_db/tofu_data_inserts.sql"

# Query related files
sql_queries: "aligned_db/synthesized_queries.sql"
translated_queries: "aligned_db/synthesized_queries.txt"
