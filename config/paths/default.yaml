# Answer perturbed data
affected_query_results_perturbed: "aligned_db/affected_synthesized_queries_results_perturbed.json"
unaffected_query_results_perturbed: "aligned_db/unaffected_synthesized_queries_results_perturbed.json"

# Separator for file operations
separator: "\n\n" 