# @package _global_

seed: 10
tag: "default_finetune"
log_dir: "logs"
task: "finetune" # Task type: "finetune" or "unlearn"

# Model configuration
model:
  name: "meta-llama/Llama-3.2-1B"  # Base model name
  path: null  # Path to model (for unlearning, this should be the fine-tuned model)
  device_map: "auto"  # Single-GPU Lightning runs normalize this to "cuda:0"; multi-GPU runs keep HF auto-sharding.
  use_fp16: true  # overridden automatically when using bf16/amp precision

# Data configuration
data:
  name: locuslab/TOFU
  benchmark: null
  train_split: train
  val_split: train
  train_subset_name: full
  train_logical_split: null
  val_subset_names: ["full"]
  val_logical_splits: null
  train_file: null
  val_file: null
  val_files: null
  train_format: null
  val_format: null
  max_length: 1024

# Training configuration
training:
  epochs: 10
  learning_rate: 1e-5
  weight_decay: 0.01
  warmup_ratio: 0.2
  max_grad_norm: 1.0
  gradient_accumulation_steps: 1  # Number of micro-batches to accumulate before stepping the optimizer
  train_batch_size: 32
  train_sample_num: null
  val_batch_size: 16
  val_sample_num: 100
  val_generation_num: 20

# Lightning Trainer configuration
trainer:
  accelerator: "auto"
  devices: "auto"
  precision: "bf16-mixed"
  max_epochs: ${training.epochs}
  gradient_clip_val: ${training.max_grad_norm}
  accumulate_grad_batches: ${training.gradient_accumulation_steps}
  log_every_n_steps: 1
  val_check_interval: 1.0
  enable_checkpointing: true
  enable_progress_bar: true
  enable_model_summary: true
  deterministic: false
  num_workers: 8
  resume_from_checkpoint: null

# Checkpointing configuration
checkpoint:
  dirpath: "model/${tag}/${model.name}/checkpoints"
  filename: "{epoch}-{step}-{train_loss:.4f}"
  save_top_k: 1
  monitor: "train_loss"
  mode: "min"
  save_last: true
  cleanup: false

# External logging configuration
tracking:
  enabled: true
  provider: "mlflow"

mlflow:
  enabled: true
  tracking_uri: null  # Defaults to a local sqlite:///.../mlflow.db tracking backend when unset
  artifact_root: null  # Defaults to a local ./mlartifacts directory when unset
  experiment_name: "RAQUEL"
  run_name: null
  tags: {}
  log_model_artifacts: false
  log_generation_artifacts: true
  log_run_artifacts: true

# Output configuration
output:
  dir: "model/${tag}/${model.name}"
  save_model: true

# Local experiment tracking configuration
results:
  enabled: true
  dir: "results"
  run_id: null
  run_name: null
  save_config: true
  save_metrics: true
  save_events: true

# Evaluation configuration
evaluation:
  run_muse: false  # Whether to run MUSE evaluation
  muse_on_train_end: false
  muse_on_epoch_end: false
  semantic_equivalence:
    enabled: true  # LLM-based semantic accuracy check
    model_name: "openai/gpt-5.4-nano-2026-03-17"
    temperature: 0.0
    max_tokens: 16000
    use_custom_api: false
    batch_size: 10
    max_examples: 100
    max_retries: 2
    retry_delay: 2.0
    max_concurrency: 4
    requests_per_second: 2.0

# Time estimation logging
time_estimation:
  enabled: true
  log_every_n_steps: 50
  warmup_steps: 5

# Default training configuration
defaults:
  - _self_

  # The following overrides are necessary to make the logging colorized.
  - override /hydra/job_logging: colorlog

hydra:
  output_subdir: null
  run:
    dir: ${log_dir}
  job_logging:
    handlers:
      console:
        class: logging.StreamHandler
        formatter: colorlog
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        filename: ${log_dir}/evaluate.log
