# @package _global_

# Fine-tuning overrides for Qwen/Qwen3.5-9B-Base
defaults:
  - retain_base
  - _self_

tag: finetune_retain-qwen3_5-9b-base

model:
  name: "Qwen/Qwen3.5-9B-Base"
  # Use QLoRA for the 9B gate run to stay within a single 48GB GPU.
  quantize_4bit: true
  lora:
    enabled: true
    gradient_checkpointing: true
    r: 16
    alpha: 32
    dropout: 0.05
    bias: "none"
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"

training:
  learning_rate: 2e-5
  train_batch_size: 4
  gradient_accumulation_steps: 8
  val_batch_size: 2
